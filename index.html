<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Selection | T.C.A.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 這裡放專屬於入口頁的樣式，避免抓不到外部 CSS */
        .language-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a; /* 深藍色背景 */
            color: white;
            z-index: 9999;
        }
        .lang-box { text-align: center; }
        .btn-group { margin-top: 30px; display: flex; gap: 20px; }
        .lang-choice {
            padding: 15px 40px;
            border: 2px solid #2563eb; /* 直接寫顏色避免變數失效 */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        .lang-choice:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="language-overlay">
        <div class="lang-box">
            <h1>T.C.A. 台灣民團協會</h1>
            <p>請選擇語言 / Please select your language</p>
            <div class="btn-group">
                <a href="zh/index.html" class="lang-choice">繁體中文</a>
                <a href="en/index.html" class="lang-choice">English</a>
            </div>
        </div>
    </div>
</body>
</html>
